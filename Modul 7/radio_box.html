<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Box Modern - Teal Edition</title>
    <style>
        :root {
            --primary-teal: #17a2b8;
            --secondary-teal: #117a8b;
            --bg-soft: #e1f5f8;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f4f7f6 0%, var(--bg-soft) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 360px;
            border-top: 6px solid var(--primary-teal);
        }

        h3 {
            margin-top: 0;
            color: var(--text-dark);
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        label {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 12px 15px;
            border-radius: 12px;
            border: 2px solid #f1f2f6;
            transition: all 0.3s ease;
            color: #555;
            font-weight: 500;
        }

        label:hover {
            background-color: #f8f9fa;
            border-color: var(--primary-teal);
        }

        /* Styling saat radio di-check (efek visual pada label) */
        label:has(input[type="radio"]:checked) {
            background-color: #e8f7f9;
            border-color: var(--primary-teal);
            color: var(--secondary-teal);
        }

        input[type="radio"] {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            /* Warna Teal saat dipilih */
            accent-color: var(--primary-teal);
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 25px 0;
        }

        .info-section {
            font-size: 0.9rem;
            color: #7f8c8d;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background-color: #f8f9fa;
            box-sizing: border-box;
            color: var(--secondary-teal);
            font-weight: bold;
            text-align: center;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .footer-id {
            margin-top: 20px;
            text-align: center;
            font-size: 11px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h3>Genre Musik Favorit</h3>
        <form name="formtes">
            <div class="radio-group">
                <label><input type="radio" name="radiomusik" value="Jazz" onclick="info()"> Jazz</label>
                <label><input type="radio" name="radiomusik" value="Keroncong" onclick="info()"> Keroncong</label>
                <label><input type="radio" name="radiomusik" value="Dangdut" onclick="info()"> Dangdut</label>
                <label><input type="radio" name="radiomusik" value="Pop" onclick="info()"> Pop</label>
            </div>
            
            <hr>
            
            <div class="info-section">
                <i class="bi bi-info-circle"></i> Hasil Pilihan:
                <input type="text" name="fieldmusik" readonly placeholder="Belum Memilih">
            </div>
        </form>

        <div class="footer-id">
            Terimakasih telah mencoba! 
        </div>
    </div>

    <script>
        function info() {
            const radios = document.formtes.radiomusik;
            const field = document.formtes.fieldmusik;

            for (let i = 0; i < radios.length; i++) {
                if (radios[i].checked) {
                    field.value = "Anda menyukai " + radios[i].value;
                    // Memberikan efek transisi sedikit pada teks
                    field.style.opacity = 0;
                    setTimeout(() => { field.style.opacity = 1; }, 50);
                }
            }
        }
    </script>
</body>
</html>
