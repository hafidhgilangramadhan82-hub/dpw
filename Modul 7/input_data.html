<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data Modern Pro - Teal Edition</title>
    <style>
        :root {
            /* Warna disesuaikan dengan tema website sebelumnya */
            --primary: #17a2b8; 
            --secondary: #117a8b;
            --bg-gradient: linear-gradient(135deg, #17a2b8 0%, #117a8b 100%);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            max-width: 380px;
            transform: translateY(0);
            transition: transform 0.3s ease;
            border-bottom: 5px solid var(--primary); /* Aksen bawah */
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 { 
            margin: 0 0 10px; 
            color: #333;
            font-size: 24px;
            font-weight: 700;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1f5f8;
            border-radius: 12px;
            box-sizing: border-box;
            transition: 0.3s;
            outline: none;
            font-size: 16px;
            background: #fdfdfd;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 10px rgba(23, 162, 184, 0.15);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(23, 162, 184, 0.3);
        }

        button:hover { 
            background: var(--secondary);
            box-shadow: 0 6px 20px rgba(17, 122, 139, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        #hasil {
            margin-top: 25px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--secondary);
            min-height: 1.5em;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        #hasil.show {
            opacity: 1;
            transform: translateY(0);
        }

        .error-text {
            color: #dc3545;
            font-size: 0.85rem;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>HALO!</h2>
        <p>Namamu siapa?</p>
        
        <div class="input-group">
            <input type="text" id="inputNama" placeholder="Ketik nama lengkap..." autocomplete="off">
        </div>
        
        <button id="btnSapa" onclick="tampilkanNama()">Sapa Saya!</button>
        
        <div id="hasil"></div>
    </div>

    <script>
        const inputField = document.getElementById("inputNama");
        const display = document.getElementById("hasil");

        function tampilkanNama() {
            const nama = inputField.value.trim();

            display.classList.remove("show");

            setTimeout(() => {
                if (nama !== "") {
                    display.innerHTML = "Hallo, " + nama + "!";
                    display.className = "show"; 
                } else {
                    display.innerHTML = "<span class='error-text'>Waduh, namanya jangan kosong ya!</span>";
                    display.className = "show";
                }
            }, 50);
        }

        inputField.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                document.getElementById("btnSapa").click();
            }
        });

        inputField.addEventListener("input", function() {
            display.classList.remove("show");
        });
    </script>

</body>
</html>
