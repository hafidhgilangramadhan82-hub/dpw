<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Modern Tosca - Hafidh Gilang</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --tosca-primary: #1abc9c;
            --tosca-dark: #16a085;
            --navy-dark: #2c3e50;
            --light-gray: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--light-gray);
        }

        /* Styling Navigasi Utama */
        nav {
            background-color: var(--navy-dark);
            display: flex;
            justify-content: center;
            border-bottom: 4px solid var(--tosca-primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
        }

        li {
            position: relative;
        }

        li a {
            display: block;
            color: white;
            padding: 18px 30px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        /* Hover pada Menu Utama */
        li:hover > a {
            background-color: var(--tosca-primary);
            color: white;
        }

        /* Styling Dropdown (Glassmorphism Effect) */
        .dropdown {
            display: none;
            position: absolute;
            background-color: rgba(255, 255, 255, 0.98);
            min-width: 200px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 100;
            flex-direction: column;
            border-radius: 0 0 10px 10px;
            border-top: 3px solid var(--tosca-primary);
            overflow: hidden;
        }

        .dropdown li a {
            color: #333;
            padding: 14px 20px;
            border-bottom: 1px solid #f1f1f1;
            font-weight: 500;
            background: transparent;
        }

        /* Efek Hover Khusus Dropdown */
        .dropdown li a:hover {
            background-color: #e8f8f5;
            color: var(--tosca-dark);
            padding-left: 35px; /* Efek geser ke kanan */
        }

        /* Indikator Panah */
        .arrow {
            font-size: 10px;
            margin-left: 8px;
            display: inline-block;
            transition: transform 0.3s;
        }

        li:hover .arrow {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>

<nav>
    <ul>
        <li><a href="#">Beranda</a></li>
        <li class="has-dropdown">
            <a href="#">Layanan <span class="arrow">▼</span></a>
            <ul class="dropdown">
                <li><a href="#">Web Design</a></li>
                <li><a href="#">Mobile Development</a></li>
                <li><a href="#">UI/UX Sporty Branding</a></li>
                <li><a href="#">Network Solutions</a></li>
            </ul>
        </li>
        <li class="has-dropdown">
            <a href="#">Proyek <span class="arrow">▼</span></a>
            <ul class="dropdown">
                <li><a href="#">Sistem Ikan Modern</a></li>
                <li><a href="#">E-Commerce Pelajar</a></li>
                <li><a href="#">Portfolio TI-2B</a></li>
            </ul>
        </li>
        <li><a href="#">Tentang</a></li>
    </ul>
</nav>

<div style="text-align: center; margin-top: 100px; color: #7f8c8d;">
    <h3>Jendela dialog</h3>
     <strong>Hafidh Gilang Ramadhan</strong></p>
</div>

<script>
$(document).ready(function(){
    // Fungsi jQuery Dropdown dengan animasi Slide
    $(".has-dropdown").hover(
        function() {
            
            $(this).find(".dropdown").stop(true, true).slideDown(300);
        }, 
        function() {
            $(this).find(".dropdown").stop(true, true).slideUp(200);
        }
    );
});
</script>

</body>
</html>
