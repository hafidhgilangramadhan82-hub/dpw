
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Confirm Box - Teal Edition</title>
    <style>
        :root {
            --primary-teal: #17a2b8;
            --secondary-teal: #117a8b;
            --bg-light: #f4f7f6;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-light);
        }

        /* Tombol Utama */
        .btn-trigger {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            background-color: var(--primary-teal);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(23, 162, 184, 0.2);
        }

        .btn-trigger:hover {
            background-color: var(--secondary-teal);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(23, 162, 184, 0.3);
        }

        /* Overlay Latar Belakang */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .overlay.show {
            display: block;
            opacity: 1;
        }

        /* Kotak Konfirmasi */
        .confirm-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -60%) scale(0.9);
            background: white;
            width: 90%;
            max-width: 350px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
            border-top: 8px solid var(--primary-teal);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .overlay.show .confirm-box {
            transform: translate(-50%, -50%) scale(1);
        }

        .confirm-box h3 {
            margin-top: 0;
            color: var(--text-dark);
            font-size: 22px;
            font-weight: 700;
        }

        .confirm-box p {
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
            line-height: 1.5;
        }

        /* Group Tombol */
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
            font-size: 14px;
            transition: 0.3s;
        }

        /* Tombol Logout/OK (Accent Teal) */
        .btn-ok {
            background-color: var(--primary-teal);
            color: white;
        }

        .btn-ok:hover {
            background-color: var(--secondary-teal);
            box-shadow: 0 4px 12px rgba(23, 162, 184, 0.2);
        }

        /* Tombol Batal (Soft Gray) */
        .btn-cancel {
            background-color: #f1f2f6;
            color: #747d8c;
        }

        .btn-cancel:hover {
            background-color: #dfe4ea;
            color: #2f3542;
        }

        #demo {
            margin-top: 25px;
            font-weight: 600;
            color: var(--secondary-teal);
            min-height: 24px;
        }
    </style>
</head>
<body>

    <h2 style="color: #2c3e50; margin-bottom: 20px;">Modern UI Confirm</h2>
    <button class="btn-trigger" onclick="showConfirm()">Coba Konfirmasi</button>
    <p id="demo"></p>

    <div id="confirmOverlay" class="overlay">
        <div class="confirm-box">
            <h3>Konfirmasi Logout</h3>
            <p>Hafidh, apakah Anda yakin ingin keluar dari sistem TI-2B?</p>
            <div class="btn-group">
                <button class="btn btn-cancel" onclick="handleChoice(false)">Batal</button>
                <button class="btn btn-ok" onclick="handleChoice(true)">Ya, Keluar</button>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById("confirmOverlay");

        function showConfirm() {
            overlay.classList.add("show");
        }

        function handleChoice(isOk) {
            const display = document.getElementById("demo");
            
            if (isOk) {
                display.innerHTML = "Status: Berhasil Logout ";
                display.style.color = "green";
            } else {
                display.innerHTML = "Status: Logout Dibatalkan ";
                display.style.color = "red";
            }
            
            overlay.classList.remove("show");
        }

        // Tutup jika area luar (overlay) diklik
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) {
                handleChoice(false);
            }
        });
    </script>
</body>
</html>
